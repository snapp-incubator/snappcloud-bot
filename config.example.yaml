# snappcloud-bot — SnappCloud Mattermost bot.
#
# Connects to Mattermost (WebSocket) and Dify. Authorization is delegated to the
# per-region mcp-authz API — the bot holds no cluster credentials.
#
# Secrets are read from the environment (never in YAML):
#   MATTERMOST_TOKEN, DIFY_API_KEY, MCP_AUTHZ_TOKEN.

mattermost:
  url: https://chat.snapp.services
  tokenEnv: MATTERMOST_TOKEN
  identityMap: {}
  # Channels: answer only when @-mentioned. DMs: always answered. Default true.
  requireMention: true

dify:
  # In-cluster Dify API service — bypasses the Contour ingress (no SSE-cutting
  # response/idle timeout, no TLS). Format: http://<api-svc>.<ns>.svc:5001/v1.
  url: http://spcld-user-docs-chatbot-api-svc.snappcloud-docs-chatbot.svc:5001/v1
  apiKeyEnv: DIFY_API_KEY
  # Conversation memory: a Mattermost thread (and each DM) keeps its Dify
  # conversation alive this long after the last message. "0" disables memory.
  conversationTTL: 1h
  # Persist thread/DM -> conversation memory to this file so users can continue
  # past conversations across bot restarts. Put it on a PVC. Empty = in-memory.
  memoryPath: /data/conversations.json

authz:
  tokenEnv: MCP_AUTHZ_TOKEN
  cacheTTL: 5m
  timeout: 10s
  # One mcp-authz endpoint per cluster. `name` MUST match the per-cluster MCP
  # tool group in the Dify workflow.
  regions:
    - name: okd4-teh-1
      url: https://mcp-authz.apps.private.okd4.teh-1.snappcloud.io
    - name: okd4-ts-2
      url: https://mcp-authz.apps.private.okd4.ts-2.staging-snappcloud.io
